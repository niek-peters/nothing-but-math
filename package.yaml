name: mod12-compiler
version: 0.1.0.0
github: "githubuser/mod12-compiler"
license: BSD-3-Clause
author: "Author name here"
maintainer: "example@example.com"
copyright: "2026 Author name here"

extra-source-files:
  - README.md
  - CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description: Please see the README on GitHub at <https://github.com/githubuser/mod12-compiler#readme>

dependencies:
  - base >= 4.7 && < 5
  - pretty-show
  - megaparsec == 9.7.0
  - containers == 0.7
  - parser-combinators == 1.3.1
  - file-embed == 0.0.16.0
  - filepath == 1.5.4.0
  - directory == 1.3.8.5

ghc-options:
  - -Wall
  - -Wcompat
  - -Widentities
  - -Wincomplete-record-updates
  - -Wincomplete-uni-patterns
  - -Wmissing-export-lists
  - -Wmissing-home-modules
  - -Wpartial-fields
  - -Wredundant-constraints

library:
  source-dirs: src

executables:
  mod12-compiler-exe:
    main: Main.hs
    source-dirs: app
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - mod12-compiler

tests:
  mod12-compiler-test:
    main: Spec.hs
    source-dirs: test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - mod12-compiler
